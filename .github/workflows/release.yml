name: Release

on:
  push:
    branches: [main]
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Resolve manifest version
        id: ver
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"
      - name: Publish release if it does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; nothing to do."
            exit 0
          fi
          gh release create "$VERSION" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes "Beta release $VERSION. Install via BRAT by adding \`Luis85/specorator-builder\`. Note: not yet smoke-tested in a live Obsidian vault." \
            main.js manifest.json styles.css
